name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        run: |
          # Ensure templates are where Godot expects them
          TEMPLATE_SRC="/github/home/.local/share/godot/export_templates/4.3.stable"
          TEMPLATE_DST="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATE_DST"
          cp "$TEMPLATE_SRC"/* "$TEMPLATE_DST/" 2>/dev/null || true
          # Also copy debug as release fallback
          for f in "$TEMPLATE_DST"/web*_debug*; do
            release_name="${f//_debug/_release}"
            if [ ! -f "$release_name" ]; then
              cp "$f" "$release_name"
            fi
          done
          # Do the same in source dir
          for f in "$TEMPLATE_SRC"/web*_debug*; do
            release_name="${f//_debug/_release}"
            if [ ! -f "$release_name" ]; then
              cp "$f" "$release_name"
            fi
          done
          echo "Templates available:"
          ls "$TEMPLATE_SRC"/web* "$TEMPLATE_DST"/web* 2>/dev/null

      - name: Create export presets
        shell: bash
        run: |
          printf '%s\n' \
            '[preset.0]' '' \
            'name="Web"' \
            'platform="Web"' \
            'runnable=true' \
            'dedicated_server=false' \
            'custom_features=""' \
            'export_filter="all_resources"' \
            'include_filter=""' \
            'exclude_filter=""' \
            'export_path="build/web/index.html"' \
            'encryption_include_filters=""' \
            'encryption_exclude_filters=""' \
            'encrypt_pck=false' \
            'encrypt_directory=false' '' \
            '[preset.0.options]' '' \
            'custom_template/debug=""' \
            'custom_template/release=""' \
            'variant/extensions_support=false' \
            'vram_texture_compression/for_desktop=true' \
            'vram_texture_compression/for_mobile=false' \
            'html/export_icon=true' \
            'html/custom_html_shell=""' \
            'html/head_include=""' \
            'html/canvas_resize_policy=2' \
            'html/focus_canvas_on_start=true' \
            'html/experimental_virtual_keyboard=false' \
            'progressive_web_app/enabled=false' \
            > export_presets.cfg

      - name: Import project
        run: godot --headless --import 2>&1 | tail -5

      - name: Export web build
        run: |
          mkdir -p build/web
          # Try release first, fall back to debug
          godot --headless --export-release "Web" build/web/index.html 2>&1 || \
          godot --headless --export-debug "Web" build/web/index.html 2>&1
          ls -lh build/web/
          test -f build/web/index.html || { echo "::error::Export failed"; exit 1; }

      - name: Add cross-origin isolation
        run: |
          cd build/web
          printf '%s' 'if(typeof window==="undefined"){self.addEventListener("install",()=>self.skipWaiting());self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));self.addEventListener("fetch",function(e){if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;e.respondWith(fetch(e.request).then(r=>{const h=new Headers(r.headers);h.set("Cross-Origin-Embedder-Policy","credentialless");h.set("Cross-Origin-Opener-Policy","same-origin");return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h})}).catch(e=>console.error(e)));})}else{const r=navigator.serviceWorker.register(window.document.currentScript.src);r.then(console.log.bind(console,"COI OK:")).catch(console.error.bind(console,"COI fail:"));}' > coi-serviceworker.js
          sed -i 's|<script |<script src="coi-serviceworker.js"></script><script |' index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
