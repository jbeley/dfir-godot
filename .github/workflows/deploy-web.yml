name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        shell: bash
        run: |
          shopt -s nullglob

          # Find where templates live in this container
          echo "=== Searching for templates ==="
          FOUND_DIR=$(find / -name "web_nothreads_debug.zip" -printf '%h\n' 2>/dev/null | head -1)
          echo "Found templates in: $FOUND_DIR"

          if [ -z "$FOUND_DIR" ]; then
            echo "::error::No web export templates found in container"
            exit 1
          fi

          # Ensure Godot can find them at the expected path
          EXPECTED_DIR="$HOME/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$EXPECTED_DIR"

          if [ "$FOUND_DIR" != "$EXPECTED_DIR" ]; then
            echo "Copying templates from $FOUND_DIR to $EXPECTED_DIR"
            cp "$FOUND_DIR"/* "$EXPECTED_DIR/" 2>/dev/null || true
          fi

          # Create release templates from debug if missing
          for f in "$EXPECTED_DIR"/web*_debug*; do
            release="${f//_debug/_release}"
            if [ -f "$f" ] && [ ! -f "$release" ]; then
              cp "$f" "$release"
              echo "Created: $(basename "$release")"
            fi
          done

          # Also do the same in the found directory
          for f in "$FOUND_DIR"/web*_debug*; do
            release="${f//_debug/_release}"
            if [ -f "$f" ] && [ ! -f "$release" ]; then
              cp "$f" "$release"
              echo "Created: $(basename "$release") (in source dir)"
            fi
          done

          echo "=== Available templates ==="
          ls -1 "$EXPECTED_DIR"/web* 2>/dev/null
          ls -1 "$FOUND_DIR"/web* 2>/dev/null

      - name: Create export presets
        shell: bash
        run: |
          printf '[preset.0]\n\nname="Web"\nplatform="Web"\nrunnable=true\ndedicated_server=false\ncustom_features=""\nexport_filter="all_resources"\ninclude_filter=""\nexclude_filter=""\nexport_path="build/web/index.html"\nencryption_include_filters=""\nencryption_exclude_filters=""\nencrypt_pck=false\nencrypt_directory=false\n\n[preset.0.options]\n\ncustom_template/debug=""\ncustom_template/release=""\nvariant/extensions_support=false\nvram_texture_compression/for_desktop=true\nvram_texture_compression/for_mobile=false\nhtml/export_icon=true\nhtml/custom_html_shell=""\nhtml/head_include=""\nhtml/canvas_resize_policy=2\nhtml/focus_canvas_on_start=true\nhtml/experimental_virtual_keyboard=true\nprogressive_web_app/enabled=false\n' > export_presets.cfg
          cat export_presets.cfg

      - name: Import project
        run: |
          godot --headless --import 2>&1 || true
          echo "Import complete"

      - name: Export web build
        run: |
          mkdir -p build/web
          echo "=== Exporting ==="
          godot --headless --export-release "Web" build/web/index.html 2>&1
          EXPORT_EXIT=$?
          echo "=== Export exit code: $EXPORT_EXIT ==="
          ls -lh build/web/
          if [ ! -f build/web/index.wasm ]; then
            echo "::error::Export failed - no index.wasm produced"
            exit 1
          fi
          echo "Export successful: $(du -sh build/web/ | cut -f1) total"

      - name: Add cross-origin isolation
        run: |
          cd build/web
          printf '%s' 'if(typeof window==="undefined"){self.addEventListener("install",()=>self.skipWaiting());self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));self.addEventListener("fetch",function(e){if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;e.respondWith(fetch(e.request).then(r=>{const h=new Headers(r.headers);h.set("Cross-Origin-Embedder-Policy","credentialless");h.set("Cross-Origin-Opener-Policy","same-origin");return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h})}).catch(e=>console.error(e)));})}else{const r=navigator.serviceWorker.register(window.document.currentScript.src);r.then(console.log.bind(console,"COI OK:")).catch(console.error.bind(console,"COI fail:"));}' > coi-serviceworker.js
          sed -i 's|<script |<script src="coi-serviceworker.js"></script><script |' index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
