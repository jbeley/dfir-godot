name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug template locations
        run: |
          echo "=== Finding export templates ==="
          find / -name "web_*" -o -name "webassembly_*" 2>/dev/null | head -20
          find / -path "*/export_templates/*" -type d 2>/dev/null | head -10
          echo "=== Godot version ==="
          godot --version 2>/dev/null || true

      - name: Create export presets
        shell: bash
        run: |
          cat > export_presets.cfg << 'HEREDOC'
          [preset.0]

          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/web/index.html"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=false
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          HEREDOC
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' export_presets.cfg
          echo "=== Generated export_presets.cfg ==="
          cat -A export_presets.cfg | head -30

      - name: Import project
        run: |
          godot --headless --import 2>&1 | tail -5
          echo "Import done"

      - name: Export web build
        run: |
          mkdir -p build/web
          echo "=== Attempting release export ==="
          godot --headless --export-release "Web" build/web/index.html 2>&1 || true
          echo "=== Checking build output ==="
          ls -la build/web/ || true
          if [ ! -f build/web/index.html ]; then
            echo "Release export failed, trying debug export..."
            godot --headless --export-debug "Web" build/web/index.html 2>&1 || true
            ls -la build/web/ || true
          fi
          if [ ! -f build/web/index.html ]; then
            echo "::error::Both export attempts failed"
            echo "=== Checking for export template issues ==="
            find / -name "*.wasm" 2>/dev/null | head -5
            exit 1
          fi
          echo "=== Export successful ==="
          ls -lh build/web/

      - name: Add cross-origin isolation
        if: success()
        run: |
          cd build/web
          cat > coi-serviceworker.js << 'EOFSW'
          if(typeof window==='undefined'){self.addEventListener("install",()=>self.skipWaiting());self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));self.addEventListener("fetch",function(e){if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;e.respondWith(fetch(e.request).then(r=>{const h=new Headers(r.headers);h.set("Cross-Origin-Embedder-Policy","credentialless");h.set("Cross-Origin-Opener-Policy","same-origin");return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h})}).catch(e=>console.error(e)));})}else{const r=navigator.serviceWorker.register(window.document.currentScript.src);r.then(console.log.bind(console,"COI SW OK:")).catch(console.error.bind(console,"COI SW fail:"));}
          EOFSW
          sed -i 's|<script |<script src="coi-serviceworker.js"></script><script |' index.html
          echo "=== Final build contents ==="
          ls -lh .

      - name: Upload pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
