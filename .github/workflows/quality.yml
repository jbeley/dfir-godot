name: Code Quality & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.96.0
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (registry configs)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --error \
            --metrics=off \
            --json \
            --output semgrep-results.json \
            .

      - name: Run Semgrep (custom GDScript ruleset)
        run: |
          # GDScript is not natively supported by Semgrep; we ship a
          # generic-mode ruleset under .semgrep/gdscript.yml that scans
          # .gd files for OS.execute abuse, load() concat, hardcoded
          # credentials, and Expression.parse with user input.
          semgrep scan \
            --config .semgrep/gdscript.yml \
            --error \
            --metrics=off \
            src/ tests/

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 14
          if-no-files-found: ignore

  gdscript-lint:
    name: GDScript Lint (gdlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install gdtoolkit
        run: pip install gdtoolkit==4.5.0

      - name: Run gdlint (blocking)
        run: |
          echo "=== GDScript Linting ==="
          gdlint src/ tests/

      - name: Run gdformat check (non-blocking advisory)
        run: |
          echo "=== GDScript Format Check ==="
          gdformat --check src/ tests/ 2>&1 || \
            echo "::warning::gdformat differences found - run 'gdformat src/ tests/' locally"

  godot-compile:
    name: Godot Compile & Unit Tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/4.3.stable
          mv /root/.local/share/godot/templates/4.3.stable/* \
             /root/.local/share/godot/export_templates/4.3.stable/ || true

      - name: Import project
        run: godot --headless --import 2>&1 | tee import.log

      - name: Check for script errors
        run: |
          if grep -q "Failed to load script" import.log; then
            echo "::error::Script compilation errors detected"
            grep "Failed to load script" import.log
            exit 1
          fi
          if grep -qE "SCRIPT ERROR|Parse Error" import.log; then
            echo "::error::Parse errors detected in import log"
            grep -E "SCRIPT ERROR|Parse Error" import.log
            exit 1
          fi
          echo "All scripts compiled successfully"

      - name: Run unit tests
        run: |
          godot --headless -s tests/run_tests.gd 2>&1 | tee test.log
          if grep -q "FAILED" test.log; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          echo "All tests passed"

  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Run ruff check (blocking)
        run: |
          echo "=== Ruff Lint ==="
          ruff check tools/

      - name: Run ruff format check (non-blocking advisory)
        run: |
          echo "=== Ruff Format Check ==="
          ruff format --check tools/ 2>&1 || \
            echo "::warning::ruff format differences found - run 'ruff format tools/' locally"

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint
        run: |
          yamllint \
            -d "{extends: relaxed, rules: {line-length: {max: 200}, trailing-spaces: enable}}" \
            .github/ .pre-commit-config.yaml .gdlintrc .semgrep/

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          if compgen -G "**/*.sh" > /dev/null 2>&1; then
            find . -name "*.sh" -exec shellcheck {} +
          else
            echo "No shell scripts to check"
          fi

  json-validate:
    name: Validate JSON Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "=== Validating JSON data files ==="
          ERRORS=0
          for f in $(find assets/data -name "*.json" 2>/dev/null); do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "OK  $f"
            else
              echo "BAD $f - INVALID JSON"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS JSON files failed validation"
            exit 1
          fi
          echo "All JSON files valid"

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run TruffleHog
        run: trufflehog filesystem --directory . --fail --no-update

  license-check:
    name: License & Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for required files
        run: |
          MISSING=0
          for f in README.md LICENSE .gitignore project.godot; do
            if [ -f "$f" ]; then
              echo "OK  $f exists"
            else
              echo "BAD $f MISSING"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "::warning::$MISSING required files missing"
          fi

      - name: Check project.godot metadata
        run: |
          if grep -q 'config/name=' project.godot; then
            echo "OK  Project name set"
          else
            echo "::error::Project name not set in project.godot"
            exit 1
          fi
